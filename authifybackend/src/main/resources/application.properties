
spring.datasource.url=enter_db_url
spring.datasource.username=enter_username
spring.datasource.password=enter_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secrect.key=enter_custom_secret_key


server.servlet.context-path = /api/v1.0


spring.mail.host=enter_host_uri
spring.mail.port=enter_port
spring.mail.username=enter_host_username
spring.mail.password=enter_password

spring.mail.protocol=smtp

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.from=enter_your_email

